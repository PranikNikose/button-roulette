services:
  backend:
    build:
      context: ./roulette-backend
    container_name: roulette-backend
    ports:
      - '8888:8888'
    environment:
      SERVER_PORT: 8888
      FRONTEND_URL: 'http://localhost:3000'
  frontend:
    build:
      context: ./roulette-frontend
    container_name: roulette-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
